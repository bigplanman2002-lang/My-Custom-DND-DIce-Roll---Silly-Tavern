<div class="dice_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>D&D Dice</b>
            <div class="inline-drawer-icon fa-solid interactable up fa-circle-chevron-up" tabindex="0"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="marginBot5">
                <label class="checkbox_label" for="dice_function_tool">
                    <input id="dice_function_tool" type="checkbox">
                    <span>Enable function tool</span>
                    <a rel="noopener" href="https://docs.sillytavern.app/for-contributors/function-calling/" class="notes-link" target="_blank">
                        <span class="note-link-span">?</span>
                    </a>
                </label>
            </div>
            <div class="marginBot5">
                <label class="checkbox_label" for="dice_show_details">
                    <input id="dice_show_details" type="checkbox">
                    <span>Show individual roll details in chat</span>
                </label>
            </div>
            <div class="marginBot5">
                <label for="dice_default_formula">
                    <span>Default formula</span>
                </label>
                <input id="dice_default_formula" type="text" class="text_pole" placeholder="1d20" maxlength="20">
            </div>
        </div>
    </div>
</div>
